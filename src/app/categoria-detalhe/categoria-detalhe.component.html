<div class="button-row">
  <button mat-flat-button color="accent" [routerLink]="['/categorias']">
    <mat-icon>list</mat-icon> Voltar
  </button>
</div>

@if (isLoadingResults) {
  <div class="example-loading-shade">
    <mat-spinner></mat-spinner>
  </div>
}

@if (!isLoadingResults) {
  <mat-card class="example-card">
    <mat-card-header>
      <mat-card-title>
        <h2>{{ categoria.nome }}</h2>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <dl>
        <dt>Imagem :</dt>
        <dd>{{ categoria.imagemUrl }}</dd>
      </dl>
    </mat-card-content>

    <mat-card-actions>
      <button mat-flat-button
              color="primary"
              [routerLink]="['/categoria-editar', categoria.categoriaId]">
        <mat-icon>edit</mat-icon> Editar
      </button>
      <button mat-flat-button
              color="warn"
              (click)="deleteCategoria(categoria.categoriaId)">
        <mat-icon>delete</mat-icon> Excluir
      </button>
    </mat-card-actions>
  </mat-card>
}
