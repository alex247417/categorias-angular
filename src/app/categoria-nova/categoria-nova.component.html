<mat-card class="categoria-card">

  <mat-card-title>
    Adicionar Nova Categoria
  </mat-card-title>

  <mat-card-content>

    <form [formGroup]="categoriaForm"
          (ngSubmit)="addCategoria()">

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Nome da Categoria</mat-label>
        <input matInput formControlName="nome">
      </mat-form-field>

      <mat-form-field appearance="fill" class="full-width">
        <mat-label>Imagem</mat-label>
        <textarea matInput formControlName="imagemUrl"></textarea>
      </mat-form-field>

      <button type="submit"
              mat-raised-button
              color="primary"
              [disabled]="categoriaForm.invalid">
        Adicionar
      </button>

    </form>

  </mat-card-content>

</mat-card>
