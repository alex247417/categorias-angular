<div>
  <h3>Editar Categoria</h3>
</div>

@if (isLoadingResults) {
  <div class="example-loading-shade">
    <mat-spinner></mat-spinner>
  </div>
} @else {
  <form [formGroup]="categoriaForm"
        (ngSubmit)="updateCategoria()">

    <mat-form-field appearance="fill">
      <mat-label>Nome da Categoria</mat-label>
      <input matInput
             placeholder="Nome da Categoria"
             formControlName="nome">
    </mat-form-field>

    <br>

    <mat-form-field appearance="fill">
      <mat-label>Imagem</mat-label>
      <input matInput
             placeholder="Imagem"
             formControlName="imagemUrl">
    </mat-form-field>

    <br>

    <button type="submit"
            mat-raised-button
            color="primary"
            [disabled]="categoriaForm.invalid">
      Salvar
    </button>

    <button type="button"
            mat-raised-button
            [routerLink]="['/categorias']"
            style="margin-left: 8px">
      Cancelar
    </button>

  </form>
}
